<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Entropy input ladder</title>
  <desc id="desc">A diagram showing how resource discovery can move from public material checks to entropy-aware scarce-resource decisions.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#071018"/><stop offset="1" stop-color="#17130c"/></linearGradient>
    <style>.label{font:800 12px Inter,ui-sans-serif,system-ui,sans-serif;letter-spacing:.16em;fill:#90ff1a}.title{font:850 40px Inter,ui-sans-serif,system-ui,sans-serif;fill:#f3f8ff}.copy{font:500 17px Inter,ui-sans-serif,system-ui,sans-serif;fill:#b8c7d4}.card{fill:rgba(255,255,255,.06);stroke:rgba(255,255,255,.16);stroke-width:1.2;rx:16}.head{font:800 18px Inter,ui-sans-serif,system-ui,sans-serif;fill:#f3f8ff}.small{font:600 13px Inter,ui-sans-serif,system-ui,sans-serif;fill:#bdd0df}.mono{font:750 13px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;fill:#f7d98f}.wire{stroke:#8fdcff;stroke-width:3;fill:none}</style>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="190" cy="590" r="270" fill="#00c2ff" opacity=".08"/><circle cx="1060" cy="130" r="260" fill="#83ff00" opacity=".08"/>
  <text x="70" y="78" class="label">RESOURCE AUTHORITY MODEL</text>
  <text x="70" y="132" class="title">Scarce resources need entropy.</text>
  <text x="70" y="168" class="copy">The simulator starts with a simple stone rule, but the design path separates readable rules from farmable outcomes.</text>
  <g transform="translate(94 270)"><rect class="card" width="196" height="210"/><text x="24" y="42" class="head">Public inputs</text><text x="24" y="80" class="mono">block type</text><text x="24" y="110" class="mono">coordinate</text><text x="24" y="140" class="mono">rule version</text><text x="24" y="174" class="small">Good for gravel</text></g>
  <g transform="translate(346 234)"><rect class="card" width="210" height="282"/><text x="24" y="42" class="head">World inputs</text><text x="24" y="80" class="small">world seed hash</text><text x="24" y="110" class="small">chunk coordinate</text><text x="24" y="140" class="small">local coordinate</text><text x="24" y="170" class="small">biome and depth</text><text x="24" y="214" class="mono">deterministic</text></g>
  <g transform="translate(612 234)"><rect class="card" width="210" height="282"/><text x="24" y="42" class="head">State inputs</text><text x="24" y="80" class="small">chunk state hash</text><text x="24" y="110" class="small">player nonce</text><text x="24" y="140" class="small">tool class</text><text x="24" y="170" class="small">recent slot entropy</text><text x="24" y="214" class="mono">harder to precompute</text></g>
  <g transform="translate(878 270)"><rect class="card" width="308" height="210"/><text x="24" y="42" class="head">Outcome policy</text><text x="24" y="80" class="small">common yield is explainable</text><text x="24" y="110" class="small">rare yield is sampled</text><text x="24" y="140" class="small">mass and stack rules stay auditable</text><text x="24" y="174" class="mono">resourceId + amount</text></g>
  <path class="wire" d="M290 376 H346"/><path class="wire" d="M556 376 H612"/><path class="wire" d="M822 376 H878"/>
  <text x="232" y="626" class="copy">This split lets designers balance readable tables without making valuable outcomes predictable before play.</text>
</svg>
